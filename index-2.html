    <style>
        /* Ensure the top cover section acts as the positioning anchor */
        .top-section {
            position: relative;
            min-height: 55vh; 
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding-bottom: 90px; /* Leaves clean room for the bar at the bottom */
            background-size: cover;
            background-position: center;
        }

        /* Position the terminal wrapper perfectly at the bottom of the image */
        .terminal-overlay-wrapper {
            position: absolute;
            bottom: 25px; 
            width: 100%;
            left: 0;
            z-index: 10;
        }

        /* Premium, semi-transparent terminal window */
        .terminal-container {
            background-color: rgba(20, 20, 20, 0.75); 
            backdrop-filter: blur(10px); /* Frosted glass effect */
            -webkit-backdrop-filter: blur(10px);
            color: #39ff14; 
            font-family: 'Courier New', Courier, monospace;
            padding: 14px 20px;
            border-radius: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1); 
            max-width: 800px; /* Prevents it from stretching too wide */
            margin: 0 auto; /* Centers it within the Bootstrap container */
        }

        .terminal-line {
            display: flex;
            align-items: center;
        }

        .terminal-prefix {
            font-weight: bold;
            margin-right: 8px;
            color: #00a8ff;
            white-space: nowrap;
        }

        .terminal-input {
            background: transparent;
            border: none;
            color: #ffffff;
            font-family: inherit;
            font-size: 1rem;
            flex-grow: 1;
            outline: none;
            caret-color: #39ff14; 
        }

        .terminal-hint {
            font-size: 0.78rem;
            color: #b5b5b5; 
            margin-top: 6px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding-top: 4px;
        }
        
        .terminal-hint code {
            color: #ff9f43;
            background: rgba(255, 159, 67, 0.15);
            padding: 1px 5px;
            border-radius: 3px;
        }

        /* Prevents avatar collision with the new layout */
        #avatar {
            margin-top: -35px;
            position: relative;
            z-index: 20;
        }
    </style>

    <script type="text/javascript" src="static/js/bootstrap.bundle.min.js"></script>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script type="text/javascript" src="static/js/marked.min.js"></script>

    <script>
        MathJax = {
            tex: {
                packages: {},
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: false,
                processEnvironments: true,
                processRefs: true,
                digits: /^(?:[0-9]+(?:\{,\}[0-9]{3})*(?:\.[0-9]*)?|\.[0-9]+)/,
                tags: 'all',
                tagSide: 'right',
                tagIndent: '0.8em',
                useLabelIds: true,
                maxMacros: 10000,
                maxBuffer: 5 * 1024,
                formatError: (jax, err) => jax.formatError(err)
            }
        };
    </script>
    <script type="text/javascript" id="MathJax-script" src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
    <script type="text/javascript" id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <script type="text/javascript" src="static/js/scripts.js"></script>
    <script type="text/javascript" src="static/js/js-yaml.min.js"></script>

    <script>
        document.getElementById('terminalInput').addEventListener('keydown', function(event) {
            if (event.key === 'Enter') {
                const command = this.value.trim().toLowerCase();
                
                if (command === 'clear') {
                    this.value = '';
                    return;
                }

                const targetMap = {
                    './publications': 'publications',
                    './projects': 'projects',
                    './news': 'news',
                    './talks': 'talks',
                    './datasets': 'datasets',
                    './cv': 'CV',
                    './awards': 'awards'
                };

                if (targetMap[command]) {
                    const sectionId = targetMap[command];
                    const targetSection = document.getElementById(sectionId);
                    
                    if (targetSection) {
                        targetSection.scrollIntoView({ behavior: 'smooth' });
                        
                        targetSection.style.outline = "2px solid #39ff14";
                        setTimeout(() => {
                            targetSection.style.outline = "none";
                        }, 2000);
                    }
                } else {
                    alert("Command not found. Please try standard terminal path variables like './publications' or './projects'");
                }
                
                this.value = '';
            }
        });
    </script>
